spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/unitrack}
spring.datasource.username=${DB_USERNAME:unitrack_user}
spring.datasource.password=${DB_PASSWORD:unitrack123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000
spring.application.name=unitrack_backend
server.error.include-message=always
server.error.include-binding-errors=always

# ==== Startup Optimization ====
spring.main.lazy-initialization=true
spring.jpa.defer-datasource-initialization=true
spring.data.jpa.repositories.bootstrap-mode=lazy

# ==== HikariCP Connection Pool Tuning ====
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

