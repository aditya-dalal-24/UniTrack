services:
  db:
    image: postgres:15-alpine
    container_name: unitrack-db
    environment:
      POSTGRES_DB: unitrack
      POSTGRES_USER: unitrack_user
      POSTGRES_PASSWORD: unitrack123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unitrack-backend
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/unitrack
      - DB_USERNAME=${DB_USERNAME:-unitrack_user}
      - DB_PASSWORD=${DB_PASSWORD:-unitrack123}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8081:8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8081/api}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-53211343073-ram5u537teqgbdqt7sln5274fqa98ele.apps.googleusercontent.com}
    container_name: unitrack-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
